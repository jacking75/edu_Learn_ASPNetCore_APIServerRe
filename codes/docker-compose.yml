# codes/ 프로젝트 공통 개발 인프라 (MySQL + Redis)
#
# 사용법:
#   cd codes
#   docker compose up -d        # MySQL(3306) + Redis(6379) 실행
#   docker compose down          # 중지
#   docker compose down -v       # 중지 + 데이터 삭제
#
# 각 프로젝트의 appsettings.json에서 localhost:3306, localhost:6379로 접속한다.
# MySQL 초기 비밀번호: 123qwe (교육용 더미 값)

services:
  mysql:
    image: mysql:8.0
    container_name: gameserver-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123qwe"
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123qwe"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:latest
    container_name: gameserver-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
